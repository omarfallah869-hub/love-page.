<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سؤال مهم جداً 💖</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #ffb6c1; /* خلفية وردية */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: radial-gradient(#ffc0cb 20%, transparent 20%), radial-gradient(#ffc0cb 20%, transparent 20%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.85);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            max-width: 90%;
            width: 350px;
        }
        h1 {
            color: #d81b60;
            font-size: 24px;
            margin-bottom: 30px;
        }
        .gif-container img {
            width: 150px;
            margin-bottom: 20px;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            height: 60px;
            align-items: center;
        }
        button {
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
        }
        #yesBtn {
            background-color: #4caf50;
            color: white;
        }
        #noBtn {
            background-color: #f44336;
            color: white;
            position: absolute;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- يمكنك تغيير النص هنا بما يناسبك -->
        <h1 id="question">فاطمة تحبيني لو لا؟ 🤔</h1>
        
        <div class="gif-container">
            <!-- رابط لصورة متحركة لطيفة لقطط -->
            <img id="statusGif" src="https://media.tenor.com/images/84102ffc4078be1a208304917f694666/tenor.gif" alt="Cute Cats">
        </div>

        <div class="buttons">
            <button id="yesBtn" onclick="selectYes()">نعم</button>
            <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">لا</button>
        </div>
    </div>

    <script>
        // دالة تجعل زر "لا" يهرب عند لمسه أو الاقتراب منه
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            // حساب أبعاد عشوائية تناسب شاشة الهاتف والـ container
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 40);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 40);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        // ماذا يحدث عند الضغط على نعم
        function selectYes() {
            document.getElementById('question').innerHTML = "كنت أعرف! وأنا أحبكِ أيضاً 💖✨";
            document.getElementById('statusGif').src = "https://media.tenor.com/images/33f1b4007621c17666245d8b871217e9/tenor.gif";
            document.getElementById('noBtn').style.display = 'none';
        }
    </script>

</body>
</html>
