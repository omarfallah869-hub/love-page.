<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى آياتي 💖</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kufam:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Kufam', sans-serif;
            overflow-x: hidden;
            position: relative;
            background-color: #ffb6c1;
        }
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* تقرأ الصورة المرفوعة في مستودعك مباشرة */
            background-image: url('girl.jpg');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 182, 193, 0.4);
            z-index: 2;
        }
        .content-wrapper {
            text-align: center;
            padding: 25px;
            width: 310px;
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }
        .message-text {
            color: #d81b60;
            font-size: 16px;
            font-weight: 600;
            line-height: 1.8;
            margin-bottom: 20px;
            white-space: pre-line;
        }
        .gif-container {
            width: 100%;
            height: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }
        .gif-container img {
            max-width: 140px;
            max-height: 140px;
            object-fit: contain;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 25px;
            height: 50px;
            position: relative;
            margin-top: 15px;
        }
        button {
            padding: 10px 30px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Kufam', sans-serif;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        #yesBtn { background-color: #4caf50; color: white; }
        #noBtn { background-color: #f44336; color: white; transition: all 0.1s ease; position: absolute; }
        .name-style {
            font-size: 26px;
            color: #d81b60;
            margin-top: 20px;
            font-weight: 800;
            display: none;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
        .heart {
            position: fixed;
            top: -20px;
            color: #ff004f;
            font-size: 24px;
            animation: fall linear forwards;
            z-index: 100;
        }
        @keyframes fall { to { transform: translateY(105vh); } }
    </style>
</head>
<body>

    <div class="bg-image" id="bgImg"></div>
    <div class="overlay"></div>

    <div class="content-wrapper">
        <div class="gif-container">
            <!-- يقرأ الـ GIF الأول المرفوع في مستودعك -->
            <img id="statusGif" src="cat1.gif" alt="Asking GIF">
        </div>

        <div class="message-text" id="question">هلا يالطولك غصن يتمايل بگلبي
تغيب الروح بغيابك ... وَرِدها
وكتاب الشوك يمدلل.. وَرٓدها
روحي بفركتُك يذبل. وَرِدها
ماي انت وترد الرُوح بْيه

بكثر ما واكف متانيك
كعد ضلي وبقيت اني
حبيبي مشتاقلي ؟؟</div>

        <div class="buttons" id="btnGroup">
            <button id="yesBtn" onclick="selectYes()">نعم</button>
            <button id="noBtn" ontouchstart="moveButton(event)" onmouseover="moveButton(event)" onclick="moveButton(event)">لا</button>
        </div>

        <div id="loveName" class="name-style">آياتي🥹❤️</div>
    </div>

    <!-- يقرأ ملف الصوت المرفوع في مستودعك مباشرة -->
    <audio id="loveSong" src="song.mp3" preload="auto"></audio>

    <script>
        function moveButton(e) {
            e.preventDefault();
            const noBtn = document.getElementById('noBtn');
            const padding = 60;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;
            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        function selectYes() {
            document.getElementById('question').innerHTML = "اني وياك وأتحمل كل ضروفك\nلو تغیب سنین صدك ما أعوفك .";
            
            /* يقرأ الـ GIF الثاني المرفوع في مستودعك */
            document.getElementById('statusGif').src = "cat2.gif";
            
            document.getElementById('btnGroup').style.display = 'none';
            document.getElementById('loveName').style.display = 'block';
            
            const audio = document.getElementById('loveSong');
            audio.play().catch(function(error) { console.log("Audio play failed"); });
            
            setInterval(createHeart, 250);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'heart';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 2 + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }
    </script>

</body>
</html>
