<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رسالة خاصة لإياتي 💖</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #ffb6c1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            /* خلفية وردية بالكامل مزخرفة بقلوب ناعمة بدون أي صناديق بيضاء */
            background-image: radial-gradient(#fff 10%, transparent 10%), radial-gradient(#fff 10%, transparent 10%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
        }
        .content-wrapper {
            text-align: center;
            padding: 20px;
            width: 320px;
            position: relative;
            z-index: 10;
        }
        .message-text {
            color: #d81b60;
            font-size: 17px;
            font-weight: bold;
            line-height: 1.8;
            margin-bottom: 25px;
            white-space: pre-line;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8);
        }
        .gif-container {
            width: 100%;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
        }
        .gif-container img {
            max-width: 160px;
            max-height: 160px;
            object-fit: contain;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 25px;
            height: 50px;
            position: relative;
            margin-top: 15px;
        }
        button {
            padding: 10px 30px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        #yesBtn {
            background-color: #4caf50;
            color: white;
        }
        #noBtn {
            background-color: #f44336;
            color: white;
            transition: all 0.1s ease;
            position: absolute;
        }
        .name-style {
            font-size: 28px;
            color: #d81b60;
            margin-top: 25px;
            font-weight: bold;
            display: none;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
        .heart {
            position: fixed;
            top: -20px;
            color: #ff004f;
            font-size: 24px;
            animation: fall linear forwards;
            z-index: 1;
        }
        @keyframes fall {
            to { transform: translateY(105vh); }
        }
    </style>
</head>
<body>

    <div class="content-wrapper">
        <div class="gif-container">
            <!-- لولو كاتي ترحب بلطف في الواجهة الملونة بالكامل -->
            <img id="statusGif" src="https://i.postimg.co/7Y63Xvfc/kitty-welcome.gif" alt="Hello Kitty">
        </div>

        <div class="message-text" id="question">هلا يالطولك غصن يتمايل بگلبي
تغيب الروح بغيابك ... وَرِدها
وكتاب الشوك يمدلل.. وَرٓدها
روحي بفركتُك يذبل. وَرِدها
ماي انت وترد الرُوح بْيه

بكثر ما واكف متانيك
كعد ضلي وبقيت اني
حبيبي مشتاقلي ؟؟</div>

        <div class="buttons" id="btnGroup">
            <button id="yesBtn" onclick="selectYes()">نعم</button>
            <button id="noBtn" ontouchstart="moveButton(event)" onmouseover="moveButton(event)" onclick="moveButton(event)">لا</button>
        </div>

        <!-- الاسم المزخرف يظهر في الواجهة الثانية بالأسفل -->
        <div id="loveName" class="name-style">آياتي🥹❤️</div>
    </div>

    <!-- المقطع الصوتي لكاظم الساهر الذي أرسلته تم دمجه هنا مباشرة -->
    <audio id="loveSong" src="https://v.kiwi/v/e9qctf12un8h.mp3" preload="auto"></audio>

    <script>
        function moveButton(e) {
            e.preventDefault();
            const noBtn = document.getElementById('noBtn');
            const padding = 60;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;
            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        function selectYes() {
            // الواجهة الثانية: تغيير النص حسب طلبك تماماً
            document.getElementById('question').innerHTML = "اني وياك وأتحمل كل ضروفك\nلو تغیب سنین صدك ما أعوفك .";
            
            // تغيير صورة لولو كاتي وهي تحتفل بالحب وقلوب طائرة بجانبها
            document.getElementById('statusGif').src = "https://i.postimg.co/D0m4mG9K/kitty-love.gif";
            
            // إخفاء الأزرار وإظهار الاسم المزخرف
            document.getElementById('btnGroup').style.display = 'none';
            document.getElementById('loveName').style.display = 'block';
            
            // تشغيل صوت أغنية القيصر
            const audio = document.getElementById('loveSong');
            audio.play().catch(function(error) {
                console.log("المتصفح يطلب ضغط الزر أولاً ليشتغل الصوت.");
            });
            
            // تشغيل تأثير تساقط القلوب
            setInterval(createHeart, 250);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'heart';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 2 + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }
    </script>

</body>
</html>
